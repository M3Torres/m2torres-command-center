name: Update Command Center

on:
  workflow_dispatch:   # Manual trigger (recommended)
  schedule:
    - cron: '0 12 * * *'   # Optional: daily at 12:00 UTC (adjust as needed)

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch fresh weather (example)
        id: weather
        run: |
          WEATHER=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=28.2489&longitude=-81.2812&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=America/New_York&forecast_days=1")
          echo "WEATHER=$WEATHER" >> $GITHUB_ENV

      - name: Generate index.html
        run: |
          cat > index.html << 'ENDOFFILE'
<!DOCTYPE html>
<html lang="en">
... paste your full current index.html content here ...
ENDOFFILE

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update Command Center morning brief $(date '+%Y-%m-%d')"
            git push
          fi
